var header_ws = new WebSocket("ws://" + url_base + ":" + url_port + "/header");
header_ws.binaryType = "arraybuffer";

let got_fm_params = false;

let FLIGHT_INFO_INDEX = 0;
let STATUS_TEXT_INDEX  = 1;
let RC_CHANNELS_INDEX = 2;
let PARAM_MSG_INDEX = 5;
let CALIBRATION_PREFIX = "[cal] "

let batt_ele = document.getElementById("battery");
let gps_ele = document.getElementById("gps");
let arm_status = document.getElementById("arm_status");
let fm_status = document.getElementById("flight_mode");
let warn = document.getElementById("mav_fail_warning");
let mav_close = document.getElementById("mav_warn_close");




header_ws.onmessage = function (evt) {
    if (batt_ele.classList.contains("w3-hide")) return;
    var msg = evt.data;
    var parser = new jParser(msg, {
        msg_type: {
            index: 'uint8',
        },
        status_text_msg: {
            status_text: ['array', 'char', 127],
        },
        rc_channels_msg: {
            chancount: 'uint8',
            chan1_raw: 'uint16',
            chan2_raw: 'uint16',
            chan3_raw: 'uint16',
            chan4_raw: 'uint16',
            chan5_raw: 'uint16',
            chan6_raw: 'uint16',
            chan7_raw: 'uint16',
            chan8_raw: 'uint16',
            chan9_raw: 'uint16',
            chan10_raw: 'uint16',
            chan11_raw: 'uint16',
            chan12_raw: 'uint16',
            chan13_raw: 'uint16',
            chan14_raw: 'uint16',
            chan15_raw: 'uint16',
            chan16_raw: 'uint16',
            chan17_raw: 'uint16',
            chan18_raw: 'uint16',
            rssi: 'uint8'
        },
        fm_msg: {
                armed: 'uint8',
                num_sats: 'uint8',
                base_mode: 'uint8',
                custom_mode: 'uint32',
                batt_remaining: 'uint8',
        },
        param_msg: {
            buffer: ['array', 'char', 16],
            param_val: 'int32'
        }
    });

    var msg_type = parser.parse('msg_type');
    switch(msg_type.index){

    	case(STATUS_TEXT_INDEX):
    		var modes = parser.parse('status_text_msg');
    		var i;
    		var error_msg = "";
            for (i = 0; i < 127; i++){
                if (modes.status_text[i] == '\x00') break;
                else error_msg = error_msg.concat(modes.status_text[i]);
            }
            
            if(error_msg.includes(CALIBRATION_PREFIX)){
                error_msg = error_msg.slice(CALIBRATION_PREFIX.length);
                onCalibrationMessage(error_msg);
                return;
            }

            
            if(error_msg.includes(CALIBRATION_PREFIX)){
                error_msg = error_msg.slice(CALIBRATION_PREFIX.length);
                onCalibrationMessage(error_msg);
                return;
            }

            warn.innerHTML = error_msg;

            if (i > 1){
                if (warn.classList.contains("w3-hide")) warn.classList.toggle("w3-hide");
                if(mav_close.classList.contains("w3-hide")) mav_close.classList.toggle("w3-hide");
            }
            break;

        case(FLIGHT_INFO_INDEX):
            if (!got_fm_params) {
                // send a request to get the parameters once we know there's a mavlink connection
                try {
                    get_initial_fm_settings() 
                } catch {}
                try {
                    get_initial_actuator_settings() 
                } catch {}
                try {
                    get_initial_rc_settings()
                }  catch {}
                try {
                    get_initial_gps_settings()
                } catch {}

                got_fm_params = true
            }

            var modes = parser.parse('fm_msg');


            if(modes.batt_remaining > 100) batt_ele.innerHTML = "N/A% <img src='images/batt-icon.png'/>";
            else batt_ele.innerHTML = modes.batt_remaining + "% <img src='images/batt-icon.png'/>";


            gps_ele.innerHTML = "GPS Sat: " + modes.num_sats;

            if (modes.armed) arm_status.innerHTML = "Armed";
            else arm_status.innerHTML = "Disarmed";

            switch(modes.base_mode){
                case 0:
                    fm_status.innerHTML = "Unknown<br>";
                    return;
                case 1:
                    fm_status.innerHTML = "Manual<br>";
                    return;
                case 2:
                    fm_status.innerHTML = "Altitude Hold<br>";
                    return;
                case 3:
                    fm_status.innerHTML = "Position Hold<br>";
                    return;
                case 4:
                    fm_status.innerHTML = "Auto<br>";
                    break;
                case 5:
                    fm_status.innerHTML = "Acro<br>";
                    return;
                case 6:
                    fm_status.innerHTML = "Offboard<br>";
                    return;
                case 7:
                    fm_status.innerHTML = "Stabilized<br>";
                    return;
                case 8:
                    fm_status.innerHTML = "Rattitude<br>";
                    return;
            }

            switch (modes.custom_mode){
                case 1:
                    fm_status.innerHTML += "Ready";
                    break;
                case 2:
                    fm_status.innerHTML += "Takeoff";
                    break;
                case 3:
                    fm_status.innerHTML += "Loiter";
                    break;
                case 4:
                    fm_status.innerHTML += "Mission";
                    break;
                case 5:
                    fm_status.innerHTML += "RTL";
                    break;
                case 6:
                    fm_status.innerHTML += "Land";
                    break;
                case 7:
                    fm_status.innerHTML += "RTGS";
                    break;
                case 8:
                    fm_status.innerHTML += "Follow Target";
                    break;
                case 9:
                    fm_status.innerHTML += "Precision Land";
                    break;
            }
            break;
        case (RC_CHANNELS_INDEX): 
            var rc_channel_info = parser.parse('rc_channels_msg');
            onRCChannelsMsg(rc_channel_info);
            break;
        case (PARAM_MSG_INDEX):
            var param_msg = parser.parse('param_msg')
            onParamMsg(param_msg)
            break;

    }
}
