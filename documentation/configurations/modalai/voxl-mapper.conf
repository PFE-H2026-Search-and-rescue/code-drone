/**
 * This file contains configuration that's specific to voxl-mapper.
 * 
 * RRT Parameters
 * rrt_min_distance:           			  Minimum edge distance in the RRT. Should be larger than voxel size otherwise
 * 										  there will be wasted computation. Default: 0.2 
 * rrt_max_runtime_nanoseconds:           Maximum amount of time allowed for the RRT planner to run. Default: 1000000000 
 * rrt_goal_threshold:                    Minimum distance to goal before a point is considered to be at the goal. Default: 0.05m 
 * rrt_prune_iterations:                  Number of iterations to run pruning on the RRT path for. Default: 100 
 * rrt_send_tree:		                  Whether to send the RRT tree for visualization in portal. Default: false 
 * treat_unknown_as_occupied:         	  Whether to treat unknown cells as occupied. Default: true 
 * 
 * Smoother Parameters
 * loco_resample_trajectory: 	          If true will take the initial guess from the linear solver and resample the
 *                                        trajectory to get a new trajectory with num_segments in it that is then
 *                                        passed to the nonlinear solver. Default: true 
 * loco_resample_visibility:              If true will resample before running the linear solver. Uses the visiblity 
 *                                        graph and a time estimation of the entire path to resample points. the 
 *                                        visibility graph is essentially the graph made up of the waypoints passed to 
 *                                        the smoother. Default: false
 * loco_num_segments:                     The number of segments that the resampled trajectory will have (only applies 
 *                                        if resample_trajectory is true. Default: 5
 * loco_add_waypoints:                    Adds waypoints into the nonlinear smoother to optimize passing through each 
 *                                        waypoint. If disabled then waypoint cost weight has no effect. Default: false
 * loco_scale_time:                       Scales the segment times evenly to ensure that the trajectory is feasible 
 *                                        given the provided v_max and a_max. Does not change the shape of the trajectory,
 *                                        and only increases segment times. Default: true
 * loco_optimize_time:                    Runs an additional optimization step (using nlopt) to optimize the segment 
 *                                        times in order to better meet the dynamic constraints. Default: true
 * loco_split_at_collisions:              Adds additional points to the trajectory if any portion of the initial linear 
 *                                        solvers trajectory is in collision. Default: true
 * loco_v_max:                            Max velocity of robot. Default: 1.0
 * loco_a_max:                            Max acceleration of robot. Default: 2.0
 * loco_yaw_rate_max:                     Max yaw rate of robot. Default: PI/4
 * loco_sampling_dt:                      Time step delta at which to sample points from the trajectory to check for collisions
 *                                        this is used in the linear solver and generally only when split at collisions is true
 *                                        Default: 0.1
 * loco_smoothness_cost_weight:           Weighting for smoothness of derivative we are optimizing for. Default: 0.1
 * loco_collision_cost_weight:            Weighting for collisions. Default: 10.0
 * loco_waypoint_cost_weight:             Weighting for waypoints (has no effect if add_waypoints_ is false). Default: 1.0
 * loco_min_collision_sampling_dist:      Time step delta at which to evaluate cost/gradient for collisions. Default: 0.1
 * loco_verbose:                          Whether to print debug statements or not. Default: false
 */
